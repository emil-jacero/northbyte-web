<!doctype html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="site-bg" aria-hidden="true"></div>
  <div class="bg-fx" aria-hidden="true">
    <span class="glow glow-warm"></span>
    <span class="glow glow-cool"></span>
  </div>
  <div class="grain" aria-hidden="true"></div>

  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <div class="toast" id="toast" role="status" aria-live="polite">Address copied</div>

  <script>
    (function () {
      var toast = document.getElementById('toast'), timer;
      function ping() {
        toast.classList.add('show');
        clearTimeout(timer);
        timer = setTimeout(function () { toast.classList.remove('show'); }, 1600);
      }
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-copy]');
        if (!btn) return;
        e.preventDefault();
        var text = btn.getAttribute('data-copy');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(ping).catch(function () {});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); ping(); } catch (err) {}
          document.body.removeChild(ta);
        }
      });
    })();

    // Live Minecraft status via the public Server List Ping (api.mcstatus.io).
    // No secrets, no backend: same data the multiplayer screen shows. Player
    // counts only — never names.
    (function () {
      var nodes = document.querySelectorAll('[data-mcstatus]');
      if (!nodes.length) return;

      function set(el, state, text, sub) {
        el.setAttribute('data-state', state);
        var t = el.querySelector('.live-text');
        if (t) t.textContent = text;
        var s = el.querySelector('.stat-sub');
        if (s) s.textContent = sub || '';
      }

      Array.prototype.forEach.call(nodes, function (el) {
        var host = el.getAttribute('data-mcstatus');
        if (!host) return;
        fetch('https://api.mcstatus.io/v2/status/java/' + encodeURIComponent(host), {
          headers: { 'Accept': 'application/json' }
        })
          .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
          .then(function (d) {
            if (!d || !d.online) { set(el, 'offline', 'Offline'); return; }
            var p = d.players || {};
            var online = (typeof p.online === 'number') ? p.online : '–';
            var max = (typeof p.max === 'number') ? p.max : '–';
            var ver = (d.version && d.version.name_clean) ? d.version.name_clean : '';
            set(el, 'online', 'Online · ' + online + ' / ' + max, ver);
          })
          .catch(function () { set(el, 'error', 'Status unavailable'); });
      });
    })();
  </script>
</body>
</html>
