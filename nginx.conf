# Static-file serving for the NorthByte site (baked-in Hugo output).
server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache fingerprinted/static assets; the HTML itself stays fresh.
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        # Static site, no client-side routing — unknown paths get a real 404.
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    # Basic hardening for a public static site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript image/svg+xml application/json;
}
